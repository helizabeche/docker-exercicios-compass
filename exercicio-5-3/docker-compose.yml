services:
  db:
    image: postgres
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
    volumes:
      - postgres-dados:/var/lib/postgresql
    networks:
      - minha-rede

  cache:
    image: redis
    networks:
      - minha-rede

volumes:
  postgres-dados:

networks:
  minha-rede: